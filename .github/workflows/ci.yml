name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MONGODB_URI: mongodb://127.0.0.1:27018/xero_time_test?replicaSet=xero_time_rs0&directConnection=true
  NEXT_PUBLIC_SERVER_URL: http://127.0.0.1:3101
  PAYLOAD_SECRET: ci-only-payload-secret-not-used-outside-tests-0123456789
  ACCOUNT_EMAIL_DELIVERY_MODE: manual

jobs:
  quality:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.28.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Start MongoDB replica set
        working-directory: .
        run: |
          docker run --detach --name xero-time-mongodb --publish 27018:27017 \
            mongo:8.0 mongod --replSet xero_time_rs0 --bind_ip_all
          for attempt in {1..30}; do
            if docker exec xero-time-mongodb mongosh --quiet --eval "db.adminCommand({ ping: 1 }).ok" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec xero-time-mongodb mongosh --quiet --eval "db.adminCommand({ ping: 1 })"
          docker exec xero-time-mongodb mongosh --quiet --eval "rs.initiate({_id:'xero_time_rs0',members:[{_id:0,host:'localhost:27017'}]})"
          docker exec xero-time-mongodb mongosh --quiet --eval "while (!db.hello().isWritablePrimary) { sleep(200) }"
      - run: pnpm verify:secrets
      - run: pnpm verify:licenses
      - run: pnpm verify:generated
      - run: pnpm check
      - run: pnpm check:compat
      - run: pnpm migrate
      - run: pnpm test:coverage
      - run: pnpm test:perf
      - run: pnpm verify:indexes
      - run: pnpm audit --prod --audit-level high
      - run: pnpm build
      - if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: build-metadata
          path: |
            app/.next/BUILD_ID
            app/.next/build-manifest.json
            app/.next/routes-manifest.json
          if-no-files-found: error
          retention-days: 7
      - if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-report
          path: app/coverage
          if-no-files-found: error
          retention-days: 7

  e2e:
    if: github.event_name == 'push' || github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.28.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Start MongoDB replica set
        working-directory: .
        run: |
          docker run --detach --name xero-time-mongodb --publish 27018:27017 \
            mongo:8.0 mongod --replSet xero_time_rs0 --bind_ip_all
          for attempt in {1..30}; do
            if docker exec xero-time-mongodb mongosh --quiet --eval "db.adminCommand({ ping: 1 }).ok" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec xero-time-mongodb mongosh --quiet --eval "db.adminCommand({ ping: 1 })"
          docker exec xero-time-mongodb mongosh --quiet --eval "rs.initiate({_id:'xero_time_rs0',members:[{_id:0,host:'localhost:27017'}]})"
          docker exec xero-time-mongodb mongosh --quiet --eval "while (!db.hello().isWritablePrimary) { sleep(200) }"
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: playwright-report
          path: app/playwright-report
          if-no-files-found: ignore
          retention-days: 7
